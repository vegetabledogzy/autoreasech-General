# ============================================================
# autoiter configuration
# Fill in this file before starting experiments.
# The agent uses this file to drive the iteration loop.
# ============================================================

# --- Task description ---
task: "image classification"          # Task type, free-form description
dataset: "CIFAR-10"                   # Dataset name
description: "ResNet on CIFAR-10"     # One-line project description

# --- Target metric ---
metric:
  name: "accuracy"                    # Metric name, must match evaluation output
  direction: "higher_is_better"       # higher_is_better or lower_is_better
  pattern: "^accuracy:"              # Regex pattern for grep to extract metric from run.log
  # Examples:
  #   accuracy → pattern: "^accuracy:"    direction: higher_is_better
  #   val_loss → pattern: "^val_loss:"    direction: lower_is_better
  #   mAP      → pattern: "^mAP:"        direction: higher_is_better
  #   BLEU     → pattern: "^BLEU:"       direction: higher_is_better

# --- Run commands ---
run_command: "python train.py"        # Train+eval command (output redirected to run.log)
eval_command: ""                      # Separate eval command; leave empty to skip

# --- Editable files ---
editable_files:
  - "train.py"                        # Files the agent is allowed to modify
  # - "model.py"                      # Add more as needed
  # - "data.py"

# --- Read-only reference files ---
readonly_files:
  - "evaluate.py"                     # Files the agent can read but not modify
  - "config.yaml"
  # - "dataset.py"

# --- Constraints ---
max_experiment_time: 600              # Max time per experiment (seconds), kill on timeout
max_consecutive_failures: 5           # Consecutive failure limit, triggers bottleneck analysis
stagnation_threshold: 3               # Consecutive no-improvement limit, triggers deep reflection

# --- Environment ---
python: "python"                      # Python interpreter, can be "uv run python" etc.
venv: ""                              # Virtualenv path, empty = use current environment
